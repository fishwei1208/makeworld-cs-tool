<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MakeWorld 內部工具台</title>
    <link rel="stylesheet" href="platform.css?v=20260531-internal-tools" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">MW</div>
          <div>
            <h1>MakeWorld 內部工具台</h1>
            <p>客服、報價、訂單與後續營運工具入口</p>
          </div>
        </div>
        <div class="status-pill">Cloudflare Access 保護中</div>
      </header>

      <section class="tool-grid" aria-label="工具列表">
        <a class="tool-card" href="customer/">
          <span class="tool-icon" aria-hidden="true">CS</span>
          <span class="tool-content">
            <strong>客服快捷台</strong>
            <small>常見話術、圖片素材、查詢連結</small>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>

        <a class="tool-card" href="quote/">
          <span class="tool-icon" aria-hidden="true">QT</span>
          <span class="tool-content">
            <strong>報價工作台</strong>
            <small>商品報價、條件試算、內部估價流程</small>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>

        <a class="tool-card" href="orders/">
          <span class="tool-icon" aria-hidden="true">OR</span>
          <span class="tool-content">
            <strong>人工訂單系統</strong>
            <small>手動建單、訂單資料整理、作業入口</small>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </section>

      <section class="coming-soon" aria-label="後續工具">
        <h2>後續可加入</h2>
        <div class="placeholder-grid">
          <div>對帳系統</div>
          <div>實體通路系統</div>
          <div>庫存 / 製作進度</div>
          <div>客服資料管理</div>
        </div>
      </section>
    </main>
  </body>
</html>
